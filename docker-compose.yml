services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: workingstudents
      POSTGRES_USER: ws_app
      POSTGRES_PASSWORD: changeme
    volumes:
      - ./db-init/workingstudents.sql:/docker-entrypoint-initdb.d/workingstudents.sql
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: workingstudents
      DB_USER: ws_app
      DB_PASSWORD: changeme
    ports:
      - "9080:9080"
    restart: on-failure

  frontend:
    build: ./frontend/Working-students
    ports:
      - "3000:80"
    depends_on:
      - backend
