server {
    listen 80;
    server_name _;

    location / {
        root   /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy all API requests to the backend container.
    # This single block handles all current and future API endpoints.
    location ~ ^/(login|signup|me|lookup-email|set-password|assignment-hours/total|assignments) {
        proxy_pass http://backend:9080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
